apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mentora-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dara-cod/mentoria_k8s#
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: mentora
  syncPolicy:
    automated:
      prune: true
      selfHeal: true